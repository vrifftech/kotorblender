name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BLENDER_VERSION: "4.2.0"
  BLENDER_DIR: ${{ github.workspace }}/.blender

jobs:
  # ── Fast checks – no Blender needed ──────────────────────────────────────
  lint:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check (py_compile)
        run: |
          python3 -c "
          import py_compile, os, sys
          errors = []
          for root, _, files in os.walk('io_scene_kotor'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              [print('SYNTAX ERROR:', e) for e in errors]
              sys.exit(1)
          print(f'All .py files pass syntax check')
          "

      - name: Lint (fatal errors only – E9, F821, F823)
        # Star-import warnings (F401/F403) are pre-existing and excluded.
        run: ruff check --select E9,F821,F823 io_scene_kotor/

  # ── Blender background-mode tests + extension build ──────────────────────
  test-and-build:
    name: Test & Build (Blender 4.2.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ${{ env.BLENDER_DIR }}
          key: blender-${{ env.BLENDER_VERSION }}-linux-x64-v1

      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          MAJOR_MINOR=$(echo "$BLENDER_VERSION" | cut -d. -f1-2)
          URL="https://download.blender.org/release/Blender${MAJOR_MINOR}/blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          echo "Downloading: $URL"
          wget -q "$URL" -O /tmp/blender.tar.xz
          mkdir -p "$BLENDER_DIR"
          tar -xf /tmp/blender.tar.xz --strip-components=1 -C "$BLENDER_DIR"

      - name: Verify Blender
        run: |
          "$BLENDER_DIR/blender" --version

      - name: Set up extension
        run: |
          EXT_DIR=~/.config/blender/$(echo "$BLENDER_VERSION" | cut -d. -f1-2)/extensions/user_default
          mkdir -p "$EXT_DIR"
          ln -sf "$GITHUB_WORKSPACE/io_scene_kotor" "$EXT_DIR/io_scene_kotor"

      - name: Run tests
        run: BLENDER="$BLENDER_DIR/blender" bash test/run_blender_tests.sh

      - name: Build extension package
        run: |
          mkdir -p build
          "$BLENDER_DIR/blender" --command extension build \
            --source-dir ./io_scene_kotor \
            --output-dir ./build

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotorblender-${{ github.sha }}
          path: build/*.zip
          retention-days: 30
