# Pytest config for KotorBlender
#
# Only test/unit is discoverable by pytest (and by the VS Code Python Test Adapter).
# Tests under test/blender/ require Blender and are run via:
#   make test  (or make test-gff, test-constants, etc.)
#   test/run_blender_tests.sh  or  test/run_blender_tests.py

[pytest]
testpaths = test/unit
python_files = test_*.py
python_functions = test_*
